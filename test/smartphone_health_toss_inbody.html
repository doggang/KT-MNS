<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 폰 상태 진단</title>
</head>
<body>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
@font-face{font-family:'KTFlow';src:url('./KTFlow-Thin.ttf') format('truetype')}
:root{
  --red:#ea1f2d;--red-dk:#c81625;--black:#1a1a1a;--ink:#222428;
  --muted:#7a818b;--line:#ededf0;--bg:#ffffff;--soft:#f6f6f7;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 12px 40px -16px rgba(0,0,0,.16);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
nav{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);z-index:10;}
.nav-in{max-width:1080px;margin:0 auto;display:flex;align-items:center;padding:10px 18px;}
.logo{height:24px;}
.hero{max-width:1080px;margin:0 auto;padding:28px 18px 16px;text-align:center;}
.badge{display:inline-block;font-size:11px;font-weight:800;color:var(--red);background:#fdeef0;padding:5px 12px;border-radius:30px;letter-spacing:.02em;margin-bottom:12px;}
.hero .ic{width:56px;height:56px;margin:0 auto 12px;border-radius:18px;background:linear-gradient(150deg,#fff,#fbecee);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);position:relative;}
.hero .ic::after{content:"";position:absolute;inset:-4px;border-radius:22px;border:2px solid rgba(234,31,45,.25);animation:ring 2.6s ease-out infinite;}
@keyframes ring{0%{transform:scale(.92);opacity:.8}100%{transform:scale(1.3);opacity:0}}
.hero .ic svg{width:28px;height:28px;}
h1{font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:-.035em;margin-bottom:6px;}
h1 b{color:var(--red);}
.hero .sub{font-size:13px;color:var(--muted);font-weight:500;}
.wrap{max-width:520px;margin:0 auto;padding:6px 18px 40px;}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 18px 20px;margin-bottom:12px;box-shadow:var(--shadow);}
label.lbl{display:block;font-size:13px;font-weight:700;margin:14px 0 10px;color:var(--black);}
label.lbl:first-of-type{margin-top:0;}
#bat-ss,#bat-ap{margin-top:14px;}
.toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.toggle button{padding:11px;border-radius:12px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:.16s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.toggle button .em{font-size:15px;}
.toggle button:hover{border-color:#d4d6da;color:var(--ink);}
.toggle button.on{border-color:var(--red);color:var(--black);box-shadow:0 0 0 3px rgba(234,31,45,.1);}
input[type=text],input[type=number],input[type=date],input[type=month]{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-family:inherit;font-weight:600;transition:.16s;}
input::placeholder{color:#b3b8c0;font-weight:500;}
input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(234,31,45,.1);}
select{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-family:inherit;font-weight:600;transition:.16s;-webkit-appearance:none;appearance:none;}
select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(234,31,45,.1);}
.hint{font-size:12px;color:var(--muted);line-height:1.5;background:var(--soft);border-radius:10px;padding:10px 12px;margin-top:8px;}
.hint b{color:var(--black);font-weight:700;}
.go{width:100%;padding:14px;border:none;border-radius:14px;margin-top:4px;background:var(--red);color:#fff;font-size:14.5px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:-.01em;transition:.16s;box-shadow:0 8px 20px -8px rgba(234,31,45,.55);}
.go:hover{background:var(--red-dk);transform:translateY(-1px);}
.go:active{transform:translateY(0);}
#rv{display:none;max-width:480px;margin:0 auto;padding:0 0 20px;}
#rv>div:first-child{padding:8px 16px;overflow-x:auto;}
#rpt{border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
.ract{display:flex;gap:8px;justify-content:center;padding:14px 0;}
.abtn{padding:9px 20px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:#191F28;}
.sbtn{padding:9px 22px;background:#191F28;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;}
@media print{
  @page{size:A4 portrait;margin:8mm 10mm}
  body{background:#fff}
  #fv,#hero,nav,.ract{display:none!important}
  #rv{display:block!important;max-width:100%;margin:0;padding:0}
  #rv>div:first-child{padding:0;overflow:visible}
  #rpt>div{width:100%!important;border:none!important;box-shadow:none!important}
}
</style>

<nav>
  <div class="nav-in">
    <img class="logo" src="./kt.png" alt="KT m&s">
  </div>
</nav>

<div class="hero" id="hero">
  <span class="badge">내 폰 성능진단</span>
  <div class="ic">
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="5" y="2" width="14" height="20" rx="3" stroke="#ea1f2d" stroke-width="1.8"/>
      <circle cx="12" cy="18" r="1" fill="#ea1f2d"/>
      <path d="M9 7h6M9 10h4" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>내 폰 <b>성능진단</b></h1>
  <p class="sub">항목을 입력하고 검사지를 생성하세요</p>
</div>

<div class="wrap" id="fv">
  <div class="card">
    <div class="toggle">
      <button id="btn-ss" class="on" onclick="setBrand('ss')"><span class="em">📱</span>삼성</button>
      <button id="btn-ap" onclick="setBrand('ap')"><span class="em"></span>애플</button>
    </div>
    <label class="lbl">고객명</label>
    <input type="text" id="nm" placeholder="홍길동">
    <label class="lbl">기기 모델</label>
    <input type="text" id="md" placeholder="갤럭시 S21">
    <label class="lbl">개통일</label>
    <input type="month" id="od">
    <div id="bat-ss">
      <label class="lbl">배터리 상태</label>
      <div class="toggle" style="grid-template-columns:repeat(4,1fr);">
        <button type="button" class="grade-btn" onclick="pickGrade('좋음')">좋음</button>
        <button type="button" class="grade-btn" onclick="pickGrade('정상')">정상</button>
        <button type="button" class="grade-btn" onclick="pickGrade('약함')">약함</button>
        <button type="button" class="grade-btn" onclick="pickGrade('나쁨')">나쁨</button>
      </div>
    </div>
    <div id="bat-ap" style="display:none">
      <label class="lbl">배터리 성능 (%)</label>
      <input type="number" id="bat" min="0" max="100" placeholder="84">
    </div>
    <div class="hint" id="howto"><b>삼성</b> · 삼성 멤버스 앱 → 진단 → 배터리 상태에서 확인 (또는 설정 → 배터리 및 디바이스 케어 → 배터리).</div>
    <label class="lbl">저장공간 사용률 (%)</label>
    <input type="number" id="sto" min="0" max="100" placeholder="72">
    <div class="hint" id="sto-howto"><b>삼성</b> · 설정 → 배터리 및 디바이스 케어 → 저장공간에서 사용량(%) 확인</div>
  </div>
  <button class="go" onclick="gen()">검사지 생성 →</button>
</div>

<div id="rv">
  <div>
    <div id="rpt"></div>
  </div>
  <div class="ract">
    <button class="abtn" onclick="back()">← 다시 입력</button>
    <button class="sbtn" onclick="saveImg()">📥 이미지로 저장</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const FA='KTFlow,Arial,sans-serif';
let brand='ss';
let samsungGrade=null;

const guides={
  ss:'<b>삼성</b> · 삼성 멤버스 앱 → 진단 → 배터리 상태에서 확인 (또는 설정 → 배터리 및 디바이스 케어 → 배터리).',
  ap:`<b>아이폰</b> · 설정 → 배터리 성능 상태 검색 및 클릭 → 최대 용량(%) 확인<div style="display:flex;gap:0;overflow-x:auto;margin-top:10px;"><div style="flex:1;text-align:center;padding:0 4px;"><img src="./i1.png" style="width:100%;max-width:120px;border-radius:10px;border:1px solid #ededf0;"><div style="font-size:11px;color:#7a818b;margin-top:4px;">① 설정 앱 실행</div></div><div style="flex:1;text-align:center;padding:0 4px;"><img src="./i2.png" style="width:100%;max-width:120px;border-radius:10px;border:1px solid #ededf0;"><div style="font-size:11px;color:#7a818b;margin-top:4px;">② 배터리 메뉴</div></div><div style="flex:1;text-align:center;padding:0 4px;"><img src="./i3.png" style="width:100%;max-width:120px;border-radius:10px;border:1px solid #ededf0;"><div style="font-size:11px;color:#7a818b;margin-top:4px;">③ 성능 최대치 확인</div></div></div>`
};

const stoGuides={
  ss:'<b>삼성</b> · 설정 → 배터리 및 디바이스 케어 → 저장공간에서 사용량(%) 확인',
  ap:`<b>아이폰</b> · 설정 → 저장공간 검색 → iPhone 저장 공간에서 사용량(%) 확인<div style="display:flex;gap:0;overflow-x:auto;margin-top:10px;"><div style="flex:1;text-align:center;padding:0 4px;"><img src="./i1.png" style="width:100%;max-width:120px;border-radius:10px;border:1px solid #ededf0;"><div style="font-size:11px;color:#7a818b;margin-top:4px;">① 설정 앱 실행</div></div><div style="flex:1;text-align:center;padding:0 4px;"><img src="./i4.png" style="width:100%;max-width:120px;border-radius:10px;border:1px solid #ededf0;"><div style="font-size:11px;color:#7a818b;margin-top:4px;">② 일반 메뉴</div></div><div style="flex:1;text-align:center;padding:0 4px;"><img src="./i5.png" style="width:100%;max-width:120px;border-radius:10px;border:1px solid #ededf0;"><div style="font-size:11px;color:#7a818b;margin-top:4px;">③ 저장 공간 확인</div></div></div>`
};

function setBrand(b){
  brand=b; samsungGrade=null;
  document.getElementById('btn-ss').classList.toggle('on',b==='ss');
  document.getElementById('btn-ap').classList.toggle('on',b==='ap');
  document.getElementById('bat-ss').style.display=b==='ss'?'block':'none';
  document.getElementById('bat-ap').style.display=b==='ap'?'block':'none';
  document.getElementById('howto').innerHTML=guides[b];
  document.getElementById('sto-howto').innerHTML=stoGuides[b];
  document.querySelectorAll('.grade-btn').forEach(btn=>btn.classList.remove('on'));
  if(b==='ap'){document.getElementById('bat').value='';}
}

function pickGrade(g){
  samsungGrade=g;
  document.querySelectorAll('.grade-btn').forEach(btn=>btn.classList.remove('on'));
  event.currentTarget.classList.add('on');
}

function mo(d){if(!d)return 0;const[y,m]=d.split('-').map(Number);const n=new Date();return Math.max(0,(n.getFullYear()-y)*12+(n.getMonth()-(m-1)));}

function calcSc(f){
  let bat;
  if(f.brand==='ss'){
    // 삼성: 좋음/정상=양호, 약함/나쁨=교체권장 (Knox 공식 기준)
    bat=f.bats==='좋음'?100:f.bats==='정상'?80:f.bats==='약함'?35:15;
  }else{
    // 애플: 80% 미만 = 교체권장 (Apple 공식 기준)
    const b=+f.bat;
    bat=b>=90?100:b>=80?80:b>=70?35:15;
  }
  const s=+f.sto;
  const sto=s<=40?100:s<=60?80:s<=75?60:s<=80?35:s<=85?20:15;
  const um=mo(f.od);
  const age=um<=12?100:um<=20?80:um<=24?62:um<=27?30:um<=30?18:8;
  const tot=Math.round(bat*0.35+sto*0.25+age*0.40);
  return{bat,sto,age,tot,um};
}

function stOf(s){
  return s>=75?{l:'양호',c:'#5db56a',bg:'#E8F6F0'}
        :s>=50?{l:'주의',c:'#D97706',bg:'#FEF3C7'}
        :{l:'교체권장',c:'#DC2626',bg:'#FEE2E2'};
}
function stOfSto(s){
  return s>=75?{l:'양호',c:'#5db56a',bg:'#E8F6F0'}
        :s>=50?{l:'주의',c:'#D97706',bg:'#FEF3C7'}
        :{l:'정리권장',c:'#DC2626',bg:'#FEE2E2'};
}

function barRow(label,valStr,score,stFn){
  const pos=Math.min(96,Math.max(4,score));
  const mc=score>=75?'#5db56a':score>=50?'#D97706':'#DC2626';
  const st=(stFn||stOf)(score);
  return`<tr style="border-bottom:1px solid #F3F4F6">
    <td style="padding:9px 0;width:82px;font-size:11.5px;font-weight:700;color:#191F28;font-family:${FA}">${label}</td>
    <td style="padding:9px 6px;width:56px;font-size:12px;font-weight:700;color:${mc};text-align:center;font-family:${FA};white-space:nowrap">${valStr}</td>
    <td style="padding:9px 0">
      <div style="position:relative;height:22px">
        <div style="position:absolute;top:7px;left:0;width:40%;height:8px;background:#E5E7EB;border-radius:3px 0 0 3px"></div>
        <div style="position:absolute;top:7px;left:40%;width:30%;height:8px;background:#E5E7EB"></div>
        <div style="position:absolute;top:7px;left:70%;width:30%;height:8px;background:#E5E7EB;border-radius:0 3px 3px 0"></div>
        <div style="position:absolute;left:40%;top:3px;height:16px;width:1px;background:#D1D5DB"></div>
        <div style="position:absolute;left:70%;top:3px;height:16px;width:1px;background:#D1D5DB"></div>
        <div style="position:absolute;left:calc(${pos}% - 9px);top:2px;width:18px;height:18px;background:${mc};border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2)"></div>
      </div>
    </td>
    <td style="padding:9px 0 9px 6px;width:50px;text-align:right">
      <span style="font-size:9.5px;font-weight:700;color:${mc};background:${st.bg};padding:2px 5px;border-radius:10px;font-family:${FA};white-space:nowrap">${st.l}</span>
    </td>
  </tr>`;
}


function miniStat(label,score,stFn){
  const st=(stFn||stOf)(score);
  return`<div style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:10px;text-align:center">
    <div style="font-size:9px;color:#9CA3AF;margin-bottom:4px;font-weight:600;letter-spacing:.3px;font-family:${FA}">${label}</div>
    <div style="font-size:22px;font-weight:700;color:${st.c};font-family:${FA}">${score}</div>
    <div style="font-size:9px;color:#9CA3AF;font-family:${FA}">/ 100</div>
  </div>`;
}

function buildRpt(f,s){
  const now=new Date();
  const dt=now.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
  const st=stOf(s.tot);

  const rm=[];
  if(s.bat<55){const batDisp=f.brand==='ss'?`'${f.bats}'`:`${f.bat}%`;rm.push(`배터리 성능이 ${batDisp}으로 크게 저하되었습니다. 기기 교체를 권장합니다.`);}
  if(s.sto<50)rm.push(`저장 공간의 ${f.sto}%를 사용 중입니다. 기기 성능에 영향을 주고 있습니다.`);
  if(s.age<50)rm.push(`사용기간 ${s.um}개월로 교체를 권장합니다. 새 기기로 변경 시 성능 개선을 기대할 수 있습니다.`);
  else if(s.age<75)rm.push(`사용기간 ${s.um}개월로 교체 시기가 가까워지고 있습니다. 기기 교체를 고려해 보세요.`);
  if(rm.length===0)rm.push('현재 기기 상태가 전반적으로 양호합니다. 정기적인 관리를 권장드립니다.');


  return`<div style="width:100%;background:#fff;font-family:${FA};overflow:hidden">



  <div style="display:grid;grid-template-columns:repeat(4,1fr);background:#F9FAFB;border-bottom:1px solid #E5E7EB">
    ${[['고객명',f.nm||'—'],['기기 모델',f.md||'—'],['사용기간',s.um?s.um+'개월':'—'],['개통일',f.od?(([y,m])=>y+'년 '+parseInt(m)+'월')(f.od.split('-')):'—']].map(([k,v],i)=>`
    <div style="padding:5px 10px;${i<3?'border-right:1px solid #E5E7EB;':''}">
      <div style="font-size:8.5px;color:#9CA3AF;margin-bottom:1px;font-weight:600;letter-spacing:.3px;font-family:${FA}">${k}</div>
      <div style="font-size:11px;font-weight:700;color:#111827;font-family:${FA};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v}</div>
    </div>`).join('')}
  </div>

  <div style="padding:16px 16px;border-bottom:1px solid #E5E7EB">
    <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px">
      <span style="font-size:13px;font-weight:700;color:#111827;font-family:${FA}">진단점수</span>
      <span style="font-size:10px;color:#9CA3AF;font-family:${FA}">Score</span>
    </div>
    <div style="height:2px;background:#111827;margin-bottom:14px"></div>
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:68px;font-weight:700;line-height:1;color:${st.c};font-family:${FA};padding-top:15px;">${s.tot}</div>
      <div style="font-size:11px;color:#9CA3AF;margin-top:2px;font-family:${FA}">/100점</div>
      <div style="margin-top:8px;padding:5px 16px;background:${st.c};color:#fff;border-radius:20px;font-size:12px;font-weight:700;font-family:${FA};display:inline-block">${st.l}</div>
    </div>
    <div style="border-radius:10px;border:1px solid #E5E7EB;overflow:hidden;display:grid;grid-template-columns:repeat(3,1fr)">
      ${[['#5db56a','75점 이상','양호'],['#D97706','50~74점','주의'],['#DC2626','49점 이하','교체권장']].map(([c,r,l],i)=>`
      <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:4px;padding:7px 4px;background:${i%2?'#F9FAFB':'#fff'};${i<2?'border-right:1px solid #F3F4F6;':''}">
        <div style="width:7px;height:7px;border-radius:50%;background:${c};flex-shrink:0"></div>
        <span style="margin-top:1px;display:flex;font-size:9px;color:#6B7280;font-family:${FA};white-space:nowrap;line-height:1;vertical-align:middle">${r}</span>
        <span style="margin-top:1px;display:flex;font-size:9px;font-weight:700;color:${c};font-family:${FA};white-space:nowrap;line-height:1;vertical-align:middle">${l}</span>
      </div>`).join('')}
    </div>
  </div>

  <div style="padding:16px 16px;border-bottom:1px solid #E5E7EB">
    <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px">
      <span style="font-size:13px;font-weight:700;color:#111827;font-family:${FA}">기기 상태 분석</span>
      <span style="font-size:10px;color:#9CA3AF;font-family:${FA}">Device Analysis</span>
    </div>
    <div style="height:2px;background:#111827;margin-bottom:10px"></div>
    <div style="padding-top:15px;display:grid;grid-template-columns:82px 56px 1fr 52px;font-size:9px;color:#9CA3AF;margin-bottom:4px;font-family:${FA}">
      <div></div><div style="text-align:center;">측정치</div>
      <div style="display:flex;justify-content:space-between;padding:0 2px"><span>교체권장◀</span><span>주의</span><span>▶양호</span></div>
      <div></div>
    </div>
    <table style="width:100%;border-collapse:collapse">
      ${barRow('배터리 건강',f.brand==='ss'?f.bats:(f.bat?f.bat+'%':'—'),s.bat)}
      ${barRow('저장공간',f.sto?f.sto+'% 사용':'—',s.sto,stOfSto)}
      ${barRow('기기 노화도',s.um?s.um+'개월':'—',s.age)}
    </table>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px">
      ${miniStat('배터리',s.bat)}
      ${miniStat('저장공간',s.sto,stOfSto)}
      ${miniStat('노화도',s.age)}
    </div>
  </div>

  <div style="padding:18px 16px;background:#fff;border-bottom:1px solid #E5E7EB">
    <div style="font-size:12px;font-weight:700;color:#111827;margin-bottom:8px;font-family:${FA}">▶ 검진 소견</div>
    ${rm.map(r=>`<div style="display:flex;gap:7px;margin-bottom:6px;font-size:11.5px;color:#374151;line-height:1.6;font-family:${FA}"><span style="color:${st.c};font-weight:700;flex-shrink:0">•</span><span>${r}</span></div>`).join('')}
  </div>

  ${s.tot<75?`
  <div style="border-top:2px solid #E5450F;padding:16px 16px;background:#FFF7F5">
    <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:10px">
      <span style="font-size:13px;font-weight:700;color:#E5450F;font-family:${FA}">교체 권장 기기 TOP 3</span>
      <span style="font-size:10px;color:#9CA3AF;font-family:${FA}">담당 직원에게 문의하세요</span>
    </div>
    <div style="height:1px;background:#FDDDD6;margin-bottom:12px"></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${(f.brand==='ss'?[
        {rank:1,name:'Galaxy S26 울트라',tag:'플래그십'},
        {rank:2,name:'Galaxy A57',tag:'가성비'},
        {rank:3,name:'iPhone 16 Pro Max',tag:'프리미엄'}
      ]:[
        {rank:1,name:'iPhone 16 Pro Max',tag:'플래그십'},
        {rank:2,name:'iPhone 16',tag:'가성비'},
        {rank:3,name:'Galaxy S26',tag:'추천'}
      ]).map(d=>`
      <div style="background:#fff;border:1px solid #FDDDD6;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px">
        <div style="background:#E5450F;color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;font-family:${FA};white-space:nowrap;flex-shrink:0">추천 ${d.rank}</div>
        <div style="flex:1;font-size:12px;font-weight:700;color:#111827;font-family:${FA}">${d.name}</div>
        <div style="font-size:9px;color:#E5450F;background:#FFF0EC;border-radius:4px;padding:2px 6px;font-weight:600;font-family:${FA};white-space:nowrap">${d.tag}</div>
      </div>`).join('')}
    </div>
  </div>`:''}

  <div style="background:#F3F4F6;border-top:1px solid #E5E7EB;padding:7px 16px;display:flex;justify-content:space-between">
    <span style="font-size:9px;color:#9CA3AF;font-family:${FA}">KT MNS 공식 채널 발행</span>
    <span style="font-size:9px;color:#9CA3AF;font-family:${FA}">발행일: ${dt}</span>
  </div>
</div>`;
}

function gen(){
  const f={brand,nm:document.getElementById('nm').value,md:document.getElementById('md').value,od:document.getElementById('od').value,bat:document.getElementById('bat').value,bats:samsungGrade||'',sto:document.getElementById('sto').value};
  const missing=[];
  if(!f.nm)missing.push('고객명');
  if(!f.md)missing.push('기기 모델');
  if(!f.od)missing.push('개통일');
  if(f.brand==='ss'&&!samsungGrade)missing.push('배터리 상태');
  if(f.brand==='ap'&&!f.bat)missing.push('배터리 성능');
  if(!f.sto)missing.push('저장공간 사용률');
  if(missing.length>0){alert('다음 항목을 입력해 주세요:\n\n• '+missing.join('\n• '));return;}
  const s=calcSc(f);
  document.getElementById('rpt').innerHTML=buildRpt(f,s);
  document.getElementById('fv').style.display='none';
  document.getElementById('hero').style.display='none';
  document.getElementById('rv').style.display='block';
}

function back(){
  samsungGrade=null;
  document.querySelectorAll('.grade-btn').forEach(btn=>btn.classList.remove('on'));
  document.getElementById('fv').style.display='block';
  document.getElementById('hero').style.display='block';
  document.getElementById('rv').style.display='none';
}

async function saveImg(){
  const el=document.getElementById('rpt');
  const btn=event.target;btn.textContent='저장 중...';btn.disabled=true;
  try{
    const c=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    const a=document.createElement('a');
    const d=new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g,'').replace(/\.$/,'');
    a.download=`내 폰 상태 진단_${d}.png`;
    a.href=c.toDataURL('image/png');a.click();
  }catch(e){alert('저장 중 오류가 발생했습니다.');}
  btn.textContent='📥 이미지로 저장';btn.disabled=false;
}
</script>
